name: Build CI

on:
  push:
  pull_request:
  workflow_call:

jobs:
  test-docker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        load: true
        tags: gbl_builder:ci
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build inside Docker container
      run: |
        docker run --rm -v "$(pwd)":/workspace -w /workspace/submodules/uefi gbl_builder:ci /bin/bash -c "
          cp -r ./Conf ./edk2/
          cd edk2 && . ./edksetup.sh && make BOARD_BOOTLOADER_PRODUCT_NAME=canoe TARGET_ARCHITECTURE=AARCH64 TARGET=RELEASE \
            CLANG_BIN=/usr/bin/ CLANG_PREFIX=aarch64-linux-gnu- VERIFIED_BOOT_ENABLED=1 \
            VERIFIED_BOOT_LE=0 AB_RETRYCOUNT_DISABLE=0 TARGET_BOARD_TYPE_AUTO=0 \
            BUILD_USES_RECOVERY_AS_BOOT=0 DISABLE_PARALLEL_DOWNLOAD_FLASH=0 PVMFW_BCC_ENABLED=-DPVMFW_BCC \
            REMOVE_CARVEOUT_REGION=1 QSPA_BOOTCONFIG_ENABLE=1 USER_BUILD_VARIANT=0 \
            PREBUILT_HOST_TOOLS='BUILD_CC=clang BUILD_CXX=clang++ LDPATH=-fuse-ld=lld BUILD_AR=llvm-ar'
        "
        if [ ! -f submodules/uefi/edk2/Build/RELEASE_CLANG35/AARCH64/LinuxLoader.efi ]; then
          echo "Failure: LinuxLoader.efi not found"
          exit 1
        fi
        echo "LinuxLoader.efi built successfully"

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lld clang llvm uuid-dev liblzma-dev mingw-w64 zip

    - name: Setup Variables
      run: |
        echo "NDK_PATH=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

    - name: Build Toolkits
      run: |
        make target_toolkit_linux
        make target_toolkit_windows
      
    - name: Build Magisk Module
      run: |
        make target_magisk_module

    - name: Build VBMeta Fixer
      run: |
        make tools_vbmetafixer_linux
        make tools_vbmetafixer_windows

    - name: Unpack artifacts
      run: |
        mkdir -p artifacts/toolkit_linux artifacts/toolkit_windows artifacts/magisk_module
        mkdir -p artifacts/vbmetafixer_linux artifacts/vbmetafixer_windows
        unzip targets/toolkit_linux/build/toolkit_linux.zip -d artifacts/toolkit_linux
        unzip targets/toolkit_windows/build/toolkit_windows.zip -d artifacts/toolkit_windows
        unzip targets/magisk_module/build/module_android.zip -d artifacts/magisk_module
        cp -r tools/vbmetafixer/build/toolkit/* artifacts/vbmetafixer_linux/
        cp -r tools/vbmetafixer/build/toolkit_win/* artifacts/vbmetafixer_windows/

    - name: Upload Linux Toolkit
      uses: actions/upload-artifact@v4
      with:
        name: toolkit_linux
        path: artifacts/toolkit_linux/*

    - name: Upload Windows Toolkit
      uses: actions/upload-artifact@v4
      with:
        name: toolkit_windows
        path: artifacts/toolkit_windows/*

    - name: Upload Magisk Module
      uses: actions/upload-artifact@v4
      with:
        name: magisk_module
        path: artifacts/magisk_module/*

    - name: Upload VBMeta Fixer Linux
      uses: actions/upload-artifact@v4
      with:
        name: vbmetafixer_linux
        path: artifacts/vbmetafixer_linux/*

    - name: Upload VBMeta Fixer Windows
      uses: actions/upload-artifact@v4
      with:
        name: vbmetafixer_windows
        path: artifacts/vbmetafixer_windows/*
